<script>
        // Simple Swipe to Delete Interaction Logic
        const swipeItems = document.querySelectorAll('.swipe-item');
        
        swipeItems.forEach(item => {
            let startX = 0;
            let currentX = 0;
            const threshold = 60; // minimum distance to trigger full open
            const maxSwipe = -80; // width of delete button

            item.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                item.style.transition = 'none';
            }, {passive: true});

            item.addEventListener('touchmove', (e) => {
                const x = e.touches[0].clientX;
                const deltaX = x - startX;
                
                // Only allow swiping left
                if (deltaX < 0) {
                    currentX = Math.max(deltaX, maxSwipe);
                    item.style.transform = `translateX(${currentX}px)`;
                }
            }, {passive: true});

            item.addEventListener('touchend', () => {
                item.style.transition = 'transform 0.3s cubic-bezier(0.32, 0.72, 0, 1)';
                
                if (currentX < -threshold) {
                    // snap open
                    item.style.transform = `translateX(${maxSwipe}px)`;
                } else {
                    // snap closed
                    item.style.transform = `translateX(0px)`;
                }
                currentX = 0;
            });
        });

        // Basic check all logic
        const selectAll = document.getElementById('selectAllCheckbox');
        const itemCheckboxes = document.querySelectorAll('.item-checkbox');

        selectAll.addEventListener('change', (e) => {
            itemCheckboxes.forEach(cb => cb.checked = e.target.checked);
        });

        itemCheckboxes.forEach(cb => {
            cb.addEventListener('change', () => {
                const allChecked = Array.from(itemCheckboxes).every(c => c.checked);
                selectAll.checked = allChecked;
            });
        });
    </script>
