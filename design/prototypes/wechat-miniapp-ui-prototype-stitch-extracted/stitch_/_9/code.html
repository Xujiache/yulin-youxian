<body class="bg-background text-on-background antialiased min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="flex items-center justify-between px-card-padding w-full h-14 z-50 sticky top-0 bg-surface dark:bg-surface-dim flat no shadows">
<button aria-label="返回" class="w-touch-target-min h-touch-target-min flex items-center justify-start scale-95 active:transition-transform text-on-surface-variant hover:opacity-80">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back_ios</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary dark:text-primary-fixed-dim absolute left-1/2 transform -translate-x-1/2">
            收货地址
        </h1>
<div class="w-touch-target-min h-touch-target-min"></div> <!-- Placeholder to balance layout -->
</header>
<!-- Main Content -->
<main class="flex-1 px-container-margin py-section-gap flex flex-col gap-4 overflow-y-auto">
<!-- Address Card 1 (Default) -->
<article class="bg-surface-container-lowest rounded-xl p-card-padding shadow-[0px_4px_12px_rgba(0,0,0,0.04)] border border-surface-container-low flex flex-col gap-3 relative">
<div class="flex justify-between items-start">
<div class="flex items-center gap-2">
<h2 class="font-body-lg text-body-lg font-semibold text-on-surface">张伟</h2>
<span class="font-body-md text-body-md text-on-surface-variant">138****5678</span>
<span class="bg-tertiary text-on-tertiary px-2 py-0.5 rounded font-label-sm text-label-sm leading-tight ml-1">默认</span>
</div>
</div>
<p class="font-body-md text-body-md text-on-surface-variant leading-snug">
                上海市 浦东新区 世纪大道 100号 环球金融中心 72楼
            </p>
<div class="h-px bg-surface-container-highest w-full my-1"></div>
<div class="flex justify-between items-center pt-1">
<div class="flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-label-sm text-label-sm">已设为默认</span>
</div>
<div class="flex gap-4">
<button class="flex items-center gap-1 text-on-surface-variant hover:text-primary transition-colors h-touch-target-min">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 0;">edit</span>
<span class="font-label-sm text-label-sm">编辑</span>
</button>
<button class="flex items-center gap-1 text-on-surface-variant hover:text-error transition-colors h-touch-target-min">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 0;">delete</span>
<span class="font-label-sm text-label-sm">删除</span>
</button>
</div>
</div>
</article>
<!-- Address Card 2 -->
<article class="bg-surface-container-lowest rounded-xl p-card-padding shadow-[0px_4px_12px_rgba(0,0,0,0.04)] border border-surface-container-low flex flex-col gap-3">
<div class="flex justify-between items-start">
<div class="flex items-center gap-2">
<h2 class="font-body-lg text-body-lg font-semibold text-on-surface">李娜</h2>
<span class="font-body-md text-body-md text-on-surface-variant">139****1234</span>
<span class="bg-surface-container-highest text-on-surface px-2 py-0.5 rounded font-label-sm text-label-sm leading-tight ml-1">公司</span>
</div>
</div>
<p class="font-body-md text-body-md text-on-surface-variant leading-snug">
                上海市 静安区 南京西路 1601号 越洋广场 35楼
            </p>
<div class="h-px bg-surface-container-highest w-full my-1"></div>
<div class="flex justify-between items-center pt-1">
<button class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors h-touch-target-min">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 0;">radio_button_unchecked</span>
<span class="font-label-sm text-label-sm">设为默认</span>
</button>
<div class="flex gap-4">
<button class="flex items-center gap-1 text-on-surface-variant hover:text-primary transition-colors h-touch-target-min">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 0;">edit</span>
<span class="font-label-sm text-label-sm">编辑</span>
</button>

</div>
