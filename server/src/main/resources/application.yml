spring:
  application:
    name: fresh-delivery-server
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/yulin_fresh?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:yulin_fresh}
    password: ${MYSQL_PASSWORD:}
    hikari:
      maximum-pool-size: ${MYSQL_POOL_MAX_SIZE:10}
      minimum-idle: ${MYSQL_POOL_MIN_IDLE:2}
      connection-timeout: ${MYSQL_CONNECTION_TIMEOUT:10000}
      validation-timeout: 3000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

wechat:
  miniapp:
    development-mode: ${WECHAT_MINIAPP_DEVELOPMENT_MODE:false}
    app-id: ${WECHAT_MINIAPP_APP_ID:}
    app-secret: ${WECHAT_MINIAPP_APP_SECRET:}
    code2-session-url: ${WECHAT_MINIAPP_CODE2_SESSION_URL:https://api.weixin.qq.com/sns/jscode2session}
  pay:
    development-mode: ${WECHAT_PAY_DEVELOPMENT_MODE:false}
    app-id: ${WECHAT_PAY_APP_ID:}
    mch-id: ${WECHAT_PAY_MCH_ID:}
    api-v3-key: ${WECHAT_PAY_API_V3_KEY:}
    merchant-serial-no: ${WECHAT_PAY_MERCHANT_SERIAL_NO:}
    private-key: ${WECHAT_PAY_PRIVATE_KEY:}
    private-key-path: ${WECHAT_PAY_PRIVATE_KEY_PATH:}
    platform-certificate-path: ${WECHAT_PAY_PLATFORM_CERTIFICATE_PATH:}
    base-url: ${WECHAT_PAY_BASE_URL:https://api.mch.weixin.qq.com}
    notify-url: ${WECHAT_PAY_NOTIFY_URL:}
    refund-notify-url: ${WECHAT_PAY_REFUND_NOTIFY_URL:}

auth:
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:Admin@123456}
  profile-storage-path: ${AUTH_PROFILE_STORAGE_PATH:data/user-profiles.json}

storefront:
  storage-path: ${STOREFRONT_STORAGE_PATH:data/storefront-state.json}
  seed-demo-data: ${STOREFRONT_SEED_DEMO_DATA:false}

persistence:
  mode: ${PERSISTENCE_MODE:mysql}
  mysql:
    shadow-write-legacy-json: ${MYSQL_SHADOW_WRITE_LEGACY_JSON:true}
    reject-suspicious-question-marks: ${MYSQL_REJECT_SUSPICIOUS_QUESTION_MARKS:true}
